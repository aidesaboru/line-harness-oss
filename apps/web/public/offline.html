<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>オフライン | Lリンク</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f9fb;
        color: #172033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
      }

      main {
        width: min(100%, 420px);
        text-align: center;
      }

      img {
        width: 88px;
        height: 88px;
        border-radius: 8px;
      }

      h1 {
        margin: 24px 0 8px;
        font-size: 24px;
        line-height: 1.4;
      }

      p {
        margin: 0;
        color: #5b6475;
        font-size: 15px;
        line-height: 1.7;
      }

      button {
        width: 100%;
        min-height: 48px;
        margin-top: 28px;
        border: 0;
        border-radius: 8px;
        background: #00b94f;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:focus-visible {
        outline: 3px solid #172033;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/l-link-192.png" alt="Lリンク">
      <h1>インターネットに<br>接続できません</h1>
      <p>通信状態を確認してから<br>もう一度お試しください</p>
      <button type="button" onclick="window.location.reload()">再読み込み</button>
    </main>
  </body>
</html>

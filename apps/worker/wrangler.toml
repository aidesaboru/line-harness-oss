name = "ec-owner-line-harness"
main = "src/index.ts"
compatibility_date = "2024-12-01"
# nodejs_compat is required by @line-harness/update-engine which pulls in
# `node:stream` (Readable.fromWeb), `node:zlib` (createGunzip), `node:crypto`
# (createHash), and the `tar-stream` package for bundle parsing during the
# /admin/update/* self-update flow. Without this flag the route imports
# fail at runtime. compatibility_date 2024-09-23+ is required for the flag.
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# ═══════════════════════════════════════════════════════════════
# デフォルト = テスト環境 (noda@)
# 使い方: npx wrangler deploy
# ═══════════════════════════════════════════════════════════════
account_id = "fd23c99ff238478f219c521454f26f43"

[assets]
directory = "dist/client"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "ec-owner-line-harness-db"
database_id = "6df8b286-0414-4e4e-b656-f3ce5257df61"

[[kv_namespaces]]
binding = "FILES"
id = "d0ff6d19c2c9470fa1663d7155b78203"

[triggers]
crons = ["*/5 * * * *", "0 */6 * * *"]

# ═══════════════════════════════════════════════════════════════
# Phase 5 self-update vars — consumed by /admin/update/*. Secrets
# (CF_API_TOKEN, ADMIN_API_KEY) must be set via `wrangler secret put`
# and are intentionally absent from this file.
# ═══════════════════════════════════════════════════════════════
[vars]
WORKER_NAME = "ec-owner-line-harness"
ADMIN_PAGES_PROJECT = "ec-owner-line-harness-admin"
LIFF_PAGES_PROJECT = "ec-owner-line-harness-liff"
D1_DATABASE_ID = "6df8b286-0414-4e4e-b656-f3ce5257df61"
MANIFEST_URL = "https://github.com/Shudesu/line-harness-oss/releases/latest/download/release-manifest.json"
WORKER_PUBLIC_URL = "https://ec-owner-line-harness.wayway-dev.workers.dev"
ADMIN_PUBLIC_URL = "https://ec-owner-line-harness-admin.pages.dev"
LIFF_PUBLIC_URL = "https://ec-owner-line-harness-liff.pages.dev"
CF_ACCOUNT_ID = "fd23c99ff238478f219c521454f26f43"
# Keep automated LINE mutations suppressed while this account is in intake mode.
LINE_CAPTURE_ONLY = "1"
# Allow only explicitly triggered operator chat sends from the CRM.
LINE_MANUAL_SEND_ENABLED = "1"
WEB_PUSH_VAPID_PUBLIC_KEY = "BEZxfIkrOVdNRX6oDtkFXBAwP1MFklOgFoIN2Cx5-Xy92sbDRTtmASeE52jD9xSmoRvjmVYMj6GoJmsEGRyDdmY"
WEB_PUSH_CONTACT = "https://ec-owner-line-harness-admin.pages.dev"

# ═══════════════════════════════════════════════════════════════
# 本番環境
# 使い方: npx wrangler deploy --env production --name your-worker-name
# D1:     npx wrangler d1 execute line-crm --env production --remote --file ...
# ═══════════════════════════════════════════════════════════════
[env.production]
account_id = "YOUR_ACCOUNT_ID"

[env.production.assets]
directory = "dist/client"
binding = "ASSETS"

[[env.production.d1_databases]]
binding = "DB"
database_name = "line-crm"
database_id = "YOUR_D1_DATABASE_ID"

[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[env.production.triggers]
crons = ["*/5 * * * *", "0 */6 * * *"]

# Phase 5 self-update vars for production. Worker / Pages / D1 names point at
# the prod resources. Secrets (CF_API_TOKEN, ADMIN_API_KEY) live in the
# production secret store, set via `wrangler secret put --env production`.
[env.production.vars]
WORKER_NAME = "your-worker-name"
ADMIN_PAGES_PROJECT = "line-harness-admin"
LIFF_PAGES_PROJECT = "line-harness-liff"
D1_DATABASE_ID = "YOUR_D1_DATABASE_ID"
MANIFEST_URL = "https://github.com/Shudesu/line-harness-oss/releases/latest/download/release-manifest.json"
WORKER_PUBLIC_URL = "https://your-worker-name.workers.dev"
ADMIN_PUBLIC_URL = "https://line-harness-admin.pages.dev"
LIFF_PUBLIC_URL = "https://line-harness-liff.pages.dev"
CF_ACCOUNT_ID = "YOUR_ACCOUNT_ID"
